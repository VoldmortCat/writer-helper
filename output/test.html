<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><title>test</title><style>*{margin:0;padding:0}
body{background:#0a1a1a;color:#d4eae8;font-family:sans-serif;display:flex}
.side{width:200px;background:#0d2424;padding:40px 16px}
.side h2{color:#2ac4b0;font-size:14px;text-align:center}
.side a{color:#8ab8b0;text-decoration:none;font-size:13px;display:block;padding:4px 12px}
.side a:hover{color:#2ac4b0}
.main{flex:1;padding:40px 48px;max-width:860px}
h1{color:#fff;border-bottom:1px solid #1a8a7a;padding-bottom:10px}
.card{background:#0f2626;border:1px solid #1a8a7a;border-radius:8px;padding:20px;margin:16px 0}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tag{background:#0d4f4a;color:#2ac4b0;font-size:12px;padding:2px 8px;border-radius:4px}
h3{color:#fff;font-size:16px;margin:0}
details{background:#0c1f1f;border:1px solid #1a6b63;border-radius:6px;padding:10px;cursor:pointer;margin-top:8px}
.txt{padding:8px 0 0;white-space:pre-wrap;font-size:14px;color:#c8ddd8;line-height:1.8}
.fb{padding:8px 0;border-bottom:1px solid rgba(42,196,176,0.1);font-size:14px;color:#c8ddd8;line-height:1.7}
.fb:last-child{border-bottom:none}
.fb b{color:#2ac4b0}
.sum{background:#0f2626;border:1px solid #1a8a7a;border-radius:8px;padding:20px;margin-top:32px}
.sum h2{color:#2ac4b0;font-size:18px;border-bottom:1px solid rgba(42,196,176,0.15);padding-bottom:10px}
.meter{display:flex;gap:16px;align-items:center;background:#0c1f1f;border:1px solid #1a6b63;border-radius:6px;padding:14px;margin:16px 0}
.num{font-size:22px;font-weight:700;color:#2ac4b0}
.lbl{font-size:11px;color:#6a9a94}
.arr{color:#1a8a7a;text-align:center;flex:1;font-size:18px}
.diff{list-style:none}
.diff li{padding:8px 0;border-bottom:1px solid rgba(42,196,176,0.08);font-size:14px;color:#c8ddd8}
.diff li:last-child{border-bottom:none}</style></head><body><nav class=side><h2>流程</h2><ul></ul></nav><main class=main><h1>test</h1><p style=color:#6a9a94;margin:8px 0 24px>Hermes Agent</p><section class=sum><h2>最结总结</h2><div class=meter><div><div class=num>100</div><div class=lbl>a</div></div><div class=arr>&rarr; +100字</div><div><div class=num>200</div><div class=lbl>b</div></div></div><ul class=diff><li>c</li></ul></section></main></body></html>
